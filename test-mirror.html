<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>镜像测试</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: #000;
            color: white;
            font-family: sans-serif;
        }

        .test-container {
            display: flex;
            gap: 50px;
            align-items: center;
            margin: 50px 0;
        }

        .test-box {
            width: 100px;
            height: 100px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        /* 测试1: 原始方法 */
        .mirror1 {
            transform: scaleX(-1);
        }
        .mirror1:hover {
            transform: scale(-1.1, 1.1);
        }

        /* 测试2: matrix方法 */
        .mirror2 {
            transform: scaleX(-1);
        }
        .mirror2:hover {
            transform: matrix(-1.1, 0, 0, 1.1, 0, 0);
        }

        /* 测试3: 嵌套div方法 */
        .wrapper3 {
            transform: scaleX(-1);
        }
        .inner3 {
            transition: transform 0.3s ease;
        }
        .inner3:hover {
            transform: scale(1.1);
        }

        label {
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>镜像悬停测试</h1>

    <div class="test-container">
        <div>
            <label>测试1: scale(-1.1, 1.1)</label>
            <div class="test-box mirror1">A</div>
        </div>

        <div>
            <label>测试2: matrix(-1.1, 0, 0, 1.1, 0, 0)</label>
            <div class="test-box mirror2">A</div>
        </div>

        <div>
            <label>测试3: 嵌套div方法</label>
            <div class="wrapper3">
                <div class="test-box inner3">A</div>
            </div>
        </div>
    </div>

    <p>将鼠标悬停在每个方块上，查看哪种方法能正确保持镜像状态并放大。</p>
</body>
</html>
