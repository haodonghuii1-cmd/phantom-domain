<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>部署测试 - Phantom Domain</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: white;
        }
        .test-container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .status {
            font-size: 24px;
            margin: 20px 0;
        }
        .success {
            color: #4ade80;
        }
        .info {
            margin-top: 30px;
            font-size: 18px;
            opacity: 0.9;
        }
        a {
            color: white;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        a:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🎉 恭喜！</h1>
        <p class="status success">✅ 网站已成功部署</p>
        <p class="info">
            如果你能看到这个页面，说明你的 Phantom Domain 项目已经成功发布到互联网上了！
        </p>
        <a href="index.html">查看主页面</a>
    </div>

    <script>
        // 显示当前 URL
        console.log('当前网站地址：', window.location.href);

        // 检查图片是否能加载
        const img = new Image();
        img.onload = () => console.log('✅ 图片资源加载正常');
        img.onerror = () => console.log('❌ 图片资源加载失败，请检查路径');
        img.src = 'images/hero-bg.jpg';
    </script>
</body>
</html>
